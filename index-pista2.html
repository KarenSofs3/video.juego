<style>
    .video-gallery {
  display: flex;
  overflow-x: auto;
  gap: 20px;
  padding: 20px;
  background-color: #f0f0f0;
  border-radius: 10px;
}

.video-gallery::-webkit-scrollbar {
  height: 8px;
}

.video-gallery::-webkit-scrollbar-track {
  background: #e0e0e0;
  border-radius: 10px;
}

.video-gallery::-webkit-scrollbar-thumb {
  background: #888;
  border-radius: 10px;
}

.video-item {
  flex: 0 0 300px;
  height: 180px;
  border: 2px solid #ccc;
  border-radius: 8px;
  overflow: hidden;
  transition: transform 0.3s ease;
  cursor: pointer;
}

.video-item:hover {
  transform: scale(1.05);
}

.video-item video {
  width: 100%;
  height: 100%;
  object-fit: cover; /* Para que el video se adapte sin distorsionarse */
}
</style>
